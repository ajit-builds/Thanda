<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="herosection.css">
</head>
<body>
    <header class="hero">
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#">Beverages</a>
            <a href="#">Legacy</a>
            <a href="#">My Cart</a>
            <a href="#">Contact</a>
        </nav>

        <div class="carousel">
            <img src="Assets/LemonThanda.svg" class="can">
            <img src="Assets/LemonThanda.svg" class="can">
            <img src="Assets/LemonThanda.svg" class="can">
            <img src="Assets/LemonThanda.svg" class="can">
            <img src="Assets/LemonThanda.svg" class="can">
        </div>

        <button class="left">←</button>
        <button class="right">→</button>
    </header>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const cans   = [...document.querySelectorAll(".can")];
    const N      = cans.length;

    // ── Circle geometry ──────────────────────────────────────────────────
    // The carousel's origin sits at the hero's bottom-right corner.
    // All directions are relative to that point:
    //   negative x  →  towards the left  (into the visible area)
    //   negative y  →  upwards           (into the visible area)
    //
    // displayAngle chooses *where on the circle* the active can sits.
    // -0.68π ≈ -122°  →  upper-left quadrant from the corner.
    // Adjust this (and radius) if you want the can higher / lower / more centred.

    const RADIUS       = 1300;          // px — circle radius
    const DISPLAY_ANG  = -Math.PI * 0.825;  // angle of the "show" slot
    const ARC_SPAN     = (2 * Math.PI / N) * 0.55; // how wide each sweep is
    const CAN_W        = 260;
    const CAN_H        = 420;          // estimated — adjust to match your SVG's aspect

    // Display position (relative to carousel origin = bottom-right corner)
    const DX = RADIUS * Math.cos(DISPLAY_ANG);
    const DY = RADIUS * Math.sin(DISPLAY_ANG);

    // Place every can at the display position; only index 0 is visible
    cans.forEach((can, i) => {
        can.style.left    = `${DX - CAN_W / 2}px`;
        can.style.top     = `${DY - CAN_H / 2}px`;
        can.style.opacity = i === 0 ? "1" : "0";
        can.style.transform = "translate(0, 0)";
    });

    let current  = 0;
    let busy     = false;

    // ── Helpers ──────────────────────────────────────────────────────────

    // Offset (translate) that moves a can from the display slot to any angle
    function offsetAt(angle) {
        return {
            x: RADIUS * (Math.cos(angle) - Math.cos(DISPLAY_ANG)),
            y: RADIUS * (Math.sin(angle) - Math.sin(DISPLAY_ANG))
        };
    }

    // Build WAAPI keyframes that arc a can from fromAngle → toAngle
    // while fading it in (fadeIn=true) or out (fadeIn=false)
    function buildKeyframes(fromAngle, toAngle, fadeIn) {
        const STEPS = 30;
        return Array.from({ length: STEPS + 1 }, (_, f) => {
            const t     = f / STEPS;
            const angle = fromAngle + (toAngle - fromAngle) * t;
            const o     = offsetAt(angle);
            return {
                transform: `translate(${o.x}px, ${o.y}px)`,
                opacity:   String(fadeIn ? t : 1 - t)
            };
        });
    }

    // Animate one can along an arc
    function arcAnimate(can, fromAngle, toAngle, fadeIn) {
        return can.animate(
            buildKeyframes(fromAngle, toAngle, fadeIn),
            { duration: 300, easing: "ease-in-out", fill: "forwards" }
        );
    }

    // Hard-reset a can to the display position (no offset, correct opacity)
    function settle(can, visible) {
        can.getAnimations().forEach(a => a.cancel());
        can.style.transform = "translate(0, 0)";
        can.style.opacity   = visible ? "1" : "0";
    }

    // ── Main transition ──────────────────────────────────────────────────
    function go(dir) {
        if (busy) return;
        busy = true;

        const outIdx = current;
        current = (current + dir + N) % N;
        const inIdx = current;

        // OUT: active can sweeps away in the direction of travel
        arcAnimate(cans[outIdx], DISPLAY_ANG, DISPLAY_ANG + dir * ARC_SPAN, false);

        // IN: next can sweeps in from the opposite side (slight delay for overlap)
        setTimeout(() => {
            const animIn = arcAnimate(
                cans[inIdx],
                DISPLAY_ANG - dir * ARC_SPAN,
                DISPLAY_ANG,
                true
            );

            animIn.onfinish = () => {
                // Settle both cans cleanly
                settle(cans[outIdx], false);
                settle(cans[inIdx],  true);
                busy = false;
            };
        }, 80);   // 80 ms overlap keeps the motion feeling continuous
    }

    // ── Button wiring ─────────────────────────────────────────────────────
    document.querySelector(".left") .addEventListener("click", () => go(-1));
    document.querySelector(".right").addEventListener("click", () => go( 1));

});
</script>
</body>
</html>
