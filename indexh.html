<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <nav class="navigation">
            <a href="#">Home</a>
            <a href="#">Beverages</a>
            <a href="#">Legacy</a>
            <a href="#">My Cart</a>
            <a href="#">Contact</a>
        </nav>

        <div class="carousel">
            <img src="Assets/blueberryasset/BlueberryC 1.svg" class="can">
            <img src="Assets/Lemonassets/Component 2 1 3.svg" class="can">
            <img src="Assets/mintassets/Lemon 1 1.svg" class="can">
            <img src="Assets/orange/CoffeC 2.svg" class="can">
            <img src="Assets/premiumcanasset/PremiumC 1 1.svg" class="can">
        </div>

        <button class="left">←</button>
        <button class="right">→</button>
    </header>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const cans  = [...document.querySelectorAll(".can")];
    const N     = cans.length;

    // ── Circle geometry (position untouched) ────────────────────────────
    const RADIUS      = 700;
    const DISPLAY_ANG = -Math.PI * 0.77;          // active-can angle
    const ANG_STEP    = (2 * Math.PI) / N;        // 72° between cans

    // ── Can half-dimensions for centering (read from rendered CSS) ───────
    // We let CSS drive the size (38vw × 62vh). After the first frame
    // the browser has laid out the cans, so we can read their dimensions.
    let CAN_W = 0;
    let CAN_H = 0;

    function readCanSize() {
        // offsetWidth/Height are 0 until the element is in the DOM with size
        const w = cans[0].offsetWidth;
        const h = cans[0].offsetHeight;
        if (w > 0) { CAN_W = w; CAN_H = h; }
    }

    // ── Wheel rotation state ─────────────────────────────────────────────
    let wheelOffset = 0;   // current rotation offset (radians)
    let busy        = false;

    // ── Opacity: full at display angle, fades within ±1.5 steps ─────────
    function opacityAt(angle) {
        let d = angle - DISPLAY_ANG;
        // wrap to [-π, π]
        d = ((d + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
        d = Math.abs(d);

        if (d > ANG_STEP * 1.4) return 0;
        // Smooth cosine falloff: 1 at center, 0 at ±1.4 steps
        return 0.5 + 0.5 * Math.cos(Math.PI * d / (ANG_STEP * 1.4));
    }

    // ── Render all cans at a given wheel rotation offset ─────────────────
    function render(offset) {
        readCanSize();   // pick up size once it's available
        const hw = CAN_W / 2;
        const hh = CAN_H / 2;

        cans.forEach((can, i) => {
            const angle = DISPLAY_ANG + offset + i * ANG_STEP;
            const x     = RADIUS * Math.cos(angle) - hw;
            const y     = RADIUS * Math.sin(angle) - hh;

            can.style.left    = `${x}px`;
            can.style.top     = `${y}px`;
            can.style.opacity = opacityAt(angle);
        });
    }

    // ── Ease function ────────────────────────────────────────────────────
    function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    // ── Initial render (size may be 0 first frame — render again on load) ─
    render(0);
    window.addEventListener("load", () => render(wheelOffset));

    // ── Spin the whole wheel by one step ─────────────────────────────────
    function go(dir) {
        // dir = +1  →  wheel spins so next can (clockwise) comes to front
        // dir = -1  →  wheel spins so previous can comes to front
        if (busy) return;
        busy = true;

        readCanSize();

        const from    = wheelOffset;
        const to      = wheelOffset - dir * ANG_STEP;
        const duration = 750;
        const t0       = performance.now();

        function frame(now) {
            const t      = Math.min((now - t0) / duration, 1);
            const offset = from + (to - from) * easeInOut(t);
            render(offset);

            if (t < 1) {
                requestAnimationFrame(frame);
            } else {
                wheelOffset = to;
                render(wheelOffset);
                busy = false;
            }
        }

        requestAnimationFrame(frame);
    }

    document.querySelector(".left") .addEventListener("click", () => go(1));
    document.querySelector(".right").addEventListener("click", () => go(-1));

});
</script>
</body>
</html>
