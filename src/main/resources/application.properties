server.port=${PORT:8080}

# Datasource defaults to H2 for local development; override with env vars in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:thandadb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

# H2 console remains available locally (disable in production via env if needed).
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}

# Deployment-safe app settings.
app.jwt.secret=${APP_JWT_SECRET:ThandaFoxSecretKeyWhichNeedsToBeLongEnoughForHS256AlgorithmToBeValid}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
